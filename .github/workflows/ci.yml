name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'chinglish-generator/package-lock.json'

      - name: Install dependencies
        working-directory: chinglish-generator
        run: npm ci

      - name: Type check
        working-directory: chinglish-generator
        run: npm run check

      - name: Build project
        working-directory: chinglish-generator
        run: npm run build

      - name: Deploy to dist directory
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: dist/
